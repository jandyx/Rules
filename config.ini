;--- 节点重命名 ---
rename=实验性 IEPL 专线@IEPL [Flower]
rename=标准 IEPL 专线@IEPL [Flower]
rename=高级 IEPL 专线@IEPL [Flower]

;--- 策略组 ---
;Proxy — 顶部 Auto + Direct，下面平铺全部节点
custom_proxy_group=🚀 Proxy`select`[]🔄 Auto - Smart`[]⚡ Auto - UrlTest`[]DIRECT`.*

;基础
