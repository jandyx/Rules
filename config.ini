custom_proxy_group=🔄 Auto - Smart`fallback`.*`http://www.gstatic.com/generate_204`300,,50

;兜底
custom_proxy_group=🐟 Final`select`[]🚀 Proxy`[]DIRECT`[]⚡ Auto - UrlTest

